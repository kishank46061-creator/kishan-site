<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Passport Photo HD Fixed</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 20px;
    transition: 0.5s;
}

/* EXTRA BIG file input */
input[type="file"] {
    font-size: 22px;
    padding: 15px;
    margin: 20px;
    border: 2px solid #000;
}

/* A4 layout */
#a4 {
    width: 210mm;
    height: 297mm;
    margin: auto;
    border: 1px solid black;

    display: grid;
    grid-template-columns: repeat(5, 3.5cm);
    grid-auto-rows: 4.5cm;
    justify-content: center;
    gap: 5mm;
    padding: 10mm;
    box-sizing: border-box;
}

.photo {
    width: 3.5cm;
    height: 4.5cm;
}

.photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* BIG buttons */
button {
    margin: 15px;
    padding: 18px 35px;
    font-size: 20px;
    cursor: pointer;
}
</style>

</head>
<body>

<h2>Passport Photo Maker (HD Fixed)</h2>

<input type="file" id="upload" accept="image/*"><br>

<button onclick="downloadHD()">Download HD</button>
<button onclick="printPage()">Print</button>

<div id="a4"></div>

<script>
const upload = document.getElementById('upload');
const a4 = document.getElementById('a4');

let loadedImage = null;

upload.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(event) {

        loadedImage = new Image();
        loadedImage.src = event.target.result;

        loadedImage.onload = function() {

            a4.innerHTML = "";

            for (let i = 0; i < 30; i++) {
                const div = document.createElement('div');
                div.className = 'photo';

                const img = document.createElement('img');
                img.src = loadedImage.src;

                div.appendChild(img);
                a4.appendChild(div);
            }
        };
    };

    reader.readAsDataURL(file);
});

// PRINT
function printPage() {
    window.print();
}

// DOWNLOAD HD
function downloadHD() {

    if (!loadedImage) {
        alert("Pehle photo upload karo!");
        return;
    }

    const canvas = document.createElement("canvas");
    canvas.width = 2480;
    canvas.height = 3508;

    const ctx = canvas.getContext("2d");

    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const cols = 5;
    const rows = 6;

    const photoW = 413;
    const photoH = 531;

    let xOffset = 100;
    let yOffset = 100;
    let gapX = 60;
    let gapY = 60;

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {

            let x = xOffset + c * (photoW + gapX);
            let y = yOffset + r * (photoH + gapY);

            ctx.drawImage(loadedImage, x, y, photoW, photoH);
        }
    }

    const link = document.createElement("a");
    link.download = "passport_hd.jpg";
    link.href = canvas.toDataURL("image/jpeg", 1.0);
    link.click();
}


// ✅ BG COLOR CHANGE EVERY SECOND

const colors = [
    "#ff0000",
    "#00ff00",
    "#0000ff",
    "#ffff00",
    "#00ffff",
    "#ff00ff",
    "#ffffff",
    "#000000",
    "#ff8800",
    "#00ff88"
];

let i = 0;

setInterval(() => {

    document.body.style.backgroundColor = colors[i];

    i++;
    if (i >= colors.length) {
        i = 0;
    }

}, 1000);

</script>

</body>
</html>
